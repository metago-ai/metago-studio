appId: ai.metago.agent
productName: MetaGO Agent
copyright: Copyright © 2026 MetaGO

directories:
  output: release-v11
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - node_modules/**/*
  - package.json

asarUnpack:
  - "node_modules/node-pty/**"
  - "node_modules/@xterm/**"

extraMetadata:
  main: dist/electron/main.js

# Windows
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
  artifactName: "MetaGO-Agent-${version}-win-x64.exe"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MetaGO Agent

# macOS
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.icns
  category: public.app-category.developer-tools
  artifactName: "MetaGO-Agent-${version}-mac-${arch}.dmg"

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Linux
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.png
  category: Development
  artifactName: "MetaGO-Agent-${version}-linux-x64.AppImage"

# 自动更新（指向 CloudBase 静态托管的 update 目录）
publish:
  - provider: generic
    url: https://metago.life/update/
    channel: latest
